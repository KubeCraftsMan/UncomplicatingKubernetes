apiVersion: v1
kind: PersistentVolume
metadata:
  labels:
    storage: lento
  name: meu-pv
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce # Somente por um unico node
  persistentVolumeReclaimPolicy: Retain # Nao vai ser excluido quando o PVC for excluido
  hostPath:
    path: /mnt/data
  storageClassName: giropops  
