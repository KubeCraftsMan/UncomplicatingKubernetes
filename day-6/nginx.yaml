apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: frontend
spec:
  selector: 
    matchLabels:
      app: frontend
  replicas: 2
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: nginx
        image: nginx
        volumeMounts:
          - name: nginx
            mountPath: /var/www
      volumes:
      - name: nginx
        persistentVolumeClaim: 
          claimName: meu-pvc
        
